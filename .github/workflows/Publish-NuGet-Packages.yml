name: Publish NuGet Packages

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  version:
    name: Determine Version
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.semver.outputs.version }}
      tag: ${{ steps.semver.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version from conventional commits
        id: semver
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "BREAKING CHANGE"
          minor_pattern: "feat"
          patch_pattern: "fix"
          format: "${major}.${minor}.${patch}"
          bump_each_commit: false

      - name: Output version
        run: |
          echo "Next version: ${{ steps.semver.outputs.version }}"
          echo "Tag: v${{ steps.semver.outputs.version }}"

  build:
    name: Build & Pack
    runs-on: ubuntu-latest
    needs: version

    strategy:
      matrix:
        dotnet: [ '8.0.x', '9.0.x' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Add DevExpress NuGet source
        run: dotnet nuget add source ${{ secrets.DX_PRIVATE_NUGET }}

      - name: Detect changed projects
        id: changed
        run: |
          DIFF=$(git diff --name-only HEAD~1 HEAD)
          CHANGED=""

          for proj in $(find . -name "*.csproj"); do
            DIR=$(dirname "$proj")
            if echo "$DIFF" | grep -q "^$DIR/"; then
              CHANGED="$CHANGED $proj"
            fi
          done

          # Trim whitespace
          CHANGED=$(echo "$CHANGED" | xargs)

          echo "Changed projects: $CHANGED"

          if [ -z "$CHANGED" ]; then
            echo "changed_projects=" >> $GITHUB_OUTPUT
          else
            echo "changed_projects=$CHANGED" >> $GITHUB_OUTPUT
          fi

      - name: Stop if nothing changed
        if: ${{ steps.changed.outputs.changed_projects == '' }}
        run: echo "No changed projects. Skipping build."

      - name: Restore
        if: ${{ steps.changed.outputs.changed_projects != '' }}
        run: dotnet restore

      - name: Build
        if: ${{ steps.changed.outputs.changed_projects != '' }}
        run: dotnet build --configuration Release --no-restore

      - name: Pack changed projects
        if: ${{ steps.changed.outputs.changed_projects != '' }}
        run: |
          mkdir -p ./nupkg
          for proj in ${{ steps.changed.outputs.changed_projects }}; do
            [ -z "$proj" ] && continue
            echo "Packing $proj"
            dotnet pack "$proj" \
              /p:Version=${{ needs.version.outputs.version }} \
              --configuration Release \
              --no-build \
              --output ./nupkg
          done

      - name: Upload artifacts
        if: ${{ steps.changed.outputs.changed_projects != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: nupkg-${{ matrix.dotnet }}
          path: ./nupkg/*.nupkg
          if-no-files-found: error

  publish:
    name: Publish to NuGet & Create Release
    runs-on: ubuntu-latest
    needs: [version, build]

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./nupkg

      - name: Publish packages
        run: |
          for pkg in ./nupkg/**/*.nupkg; do
            echo "Publishing $pkg"
            dotnet nuget push "$pkg" \
              --api-key ${{ secrets.NUGET_API_KEY }} \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

      - name: Auto-generate release notes
        id: notes
        uses: mikepenz/release-changelog-builder-action@v4
        with:
          configuration: ".github/release-notes-config.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: Release v${{ needs.version.outputs.version }}
          body: ${{ steps.notes.outputs.changelog }}
          files: ./nupkg/**/*.nupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
