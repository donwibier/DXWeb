name: Publish NuGet Packages

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  version:
    name: Determine Version
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.semver.outputs.version }}
      tag: ${{ steps.semver.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version from conventional commits
        id: semver
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "BREAKING CHANGE"
          minor_pattern: "feat"
          patch_pattern: "fix"
          format: "${major}.${minor}.${patch}"
          bump_each_commit: false

      - name: Output version
        run: |
          echo "Next version: ${{ steps.semver.outputs.version }}"
          echo "Tag: v${{ steps.semver.outputs.version }}"

  build:
    name: Build & Pack
    runs-on: ubuntu-latest
    needs: version

    strategy:
      matrix:
        dotnet: [ '8.0.x', '9.0.x', '10.0.x' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Add DevExpress NuGet source
        run: dotnet nuget add source ${{ secrets.DX_PRIVATE_NUGET }}

      - name: Detect changed projects
        id: changed
        run: |
          DIFF=$(git diff --name-only HEAD~1 HEAD)
          CHANGED=""

          for proj in $(find . -name "*.csproj"); do
            DIR=$(dirname "$proj")
            if echo "$DIFF"